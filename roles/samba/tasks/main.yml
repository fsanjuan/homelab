---
- name: Install Samba
  ansible.builtin.apt:
    name: samba
    state: present
    update_cache: true

- name: Create music directory
  ansible.builtin.file:
    path: /srv/music
    state: directory
    mode: '0755'
    owner: build
    group: build

- name: Template Samba config
  ansible.builtin.template:
    src: smb.conf.j2
    dest: /etc/samba/smb.conf
    mode: '0644'
  notify: Restart Samba

- name: Set Samba password for build user
  ansible.builtin.shell: "printf '%s\n%s\n' '{{ samba_password }}' '{{ samba_password }}' | smbpasswd -a -s build"
  no_log: true
  changed_when: false

- name: Ensure Samba service is enabled and running
  ansible.builtin.service:
    name: smbd
    state: started
    enabled: true
